apiVersion: v1
kind: Service
metadata:
  name: bustrack-service-helm
spec:
  type: {{ .Values.service.type }}
  selector:
    app: bustrack
  ports:
    - port: {{ .Values.service.puertoInterno }}
      targetPort: {{ .Values.service.puertoInterno }}
      nodePort: {{ .Values.service.puertoExterno }} 