apiVersion: apps/v1
kind: Deployment
metadata:
  name: bustrack-backend-helm
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: bustrack
  template:
    metadata:
      labels:
        app: bustrack
    spec:
      containers:
      - name: bustrack-node
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: Never
        ports:
        - containerPort: {{ .Values.service.puertoInterno }}