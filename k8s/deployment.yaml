apiVersion: apps/v1
kind: Deployment
metadata:
  name: bustrack-backend
  labels:
    app: bustrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bustrack
  template:
    metadata:
      labels:
        app: bustrack
    spec:
      containers:
      - name: bustrack-node
        image: bustrack-backend:latest
        imagePullPolicy: Never 
        ports:
        - containerPort: 3000